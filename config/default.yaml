# ============================================================
# SAnalysis - Default Configuration
# Phase 1: Zero-Cost Prototype ($0/month)
# ============================================================

general:
  cache_dir: "data/cache"
  output_dir: "data/output"
  cache_ttl_hours: 4          # How long cached data stays valid
  max_workers: 4              # Concurrent data fetch threads
  log_level: "INFO"
  network_timeout_seconds: 30 # Timeout for outbound HTTP requests (Finviz, etc.)

# -----------------------------------------------------------
# API Credentials (override via config/secrets.yaml or env vars)
# -----------------------------------------------------------
api_keys:
  reddit_client_id: ""
  reddit_client_secret: ""
  reddit_user_agent: "SAnalysis/0.1 by MemeStockTeam"
  anthropic_api_key: ""
  # Future Phase 2+ keys:
  # finnhub_api_key: ""
  # alpha_vantage_key: ""

# -----------------------------------------------------------
# Red Team: Short Squeeze Sniper
# -----------------------------------------------------------
red_team:
  # Screening thresholds
  min_short_float_pct: 10.0     # Minimum short float % to consider
  min_days_to_cover: 3.0        # Minimum DTC
  min_borrow_fee_pct: 5.0       # Elevated borrow fee threshold
  max_market_cap_millions: 2000  # Focus on small caps (10x potential requires <$2B)
  min_relative_volume: 1.5      # Minimum RVOL for activity signal

  # Scoring weights (sum = 100)
  weight_short_intensity: 25
  weight_cover_difficulty: 25
  weight_catalyst_proximity: 25
  weight_technical_momentum: 25

  # Finviz screener filters
  finviz_filters:
    short_float: "over10"         # >10% short float
    average_volume: "over200k"    # Liquid enough to trade
    price: "over1"                # No penny stocks

# -----------------------------------------------------------
# Orange Team: Gamma Squeeze & Options Flow Hunter
# -----------------------------------------------------------
orange_team:
  # Options screening thresholds
  min_option_volume: 1000         # Minimum total option volume
  unusual_volume_ratio: 3.0       # Vol/OI ratio threshold for unusual activity
  min_iv_percentile: 50           # Minimum IV rank to flag
  gex_calculation_enabled: true
  near_expiry_days: 30            # Focus on near-term expirations

  max_market_cap_millions: 5000   # Gamma squeezes work on mid-caps; mega-caps excluded

  # GEX parameters
  spot_price_range_pct: 20        # +/- range around spot for GEX calc
  strike_step_count: 50           # Number of strikes to evaluate

# -----------------------------------------------------------
# Yellow Team: Social Sentiment Quant Recon
# -----------------------------------------------------------
yellow_team:
  # Reddit configuration
  subreddits:
    - "wallstreetbets"
    - "stocks"
    - "pennystocks"
    - "shortsqueeze"
    - "options"
    - "smallstreetbets"
  reddit_post_limit: 100          # Posts per subreddit per scan
  reddit_min_score: 10            # Minimum upvotes to consider
  reddit_min_account_age_days: 30 # Bot filter
  reddit_min_karma: 100           # Bot filter

  # ApeWisdom
  apewisdom_top_n: 50             # Top N trending tickers

  # Google Trends
  google_trends_timeframe: "now 7-d"
  google_trends_geo: "US"

  # Sentiment thresholds
  sentiment_bullish_threshold: 0.3
  sentiment_bearish_threshold: -0.3
  mention_spike_multiplier: 3.0   # X times above average = spike
  max_market_cap_millions: 3000   # Social sentiment most actionable for small caps

# -----------------------------------------------------------
# Green Team: Low Float Breakout Special Ops
# -----------------------------------------------------------
green_team:
  # Float screening
  max_float_millions: 50          # Low float threshold
  min_price: 1.0                  # No sub-penny
  max_price: 30.0                 # Focus range (tightened for 10x small-cap targets)
  max_market_cap_millions: 2000   # Low-float breakouts most explosive in small caps

  # Volume thresholds
  min_rvol: 2.0                   # Relative volume multiplier
  min_avg_volume: 100000          # Minimum average daily volume

  # Technical indicator parameters
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  ma_short: 9
  ma_medium: 20
  ma_long: 50
  bb_period: 20
  bb_std: 2.0
  atr_period: 14
  obv_enabled: true
  vwap_enabled: true

  # Breakout detection
  consolidation_days: 10          # Min days of consolidation before breakout
  breakout_volume_multiple: 2.5   # Volume must be X times average
  breakout_price_pct: 3.0         # Price move % threshold

# -----------------------------------------------------------
# Blue Team: Momentum + Catalyst Fusion Elite
# -----------------------------------------------------------
blue_team:
  # Historical analysis window (must accommodate longest momentum_period)
  lookback_months: 14             # 252 trading days ≈ 12 months + 2 months buffer
  max_lookback_months: 18

  # Momentum parameters
  momentum_periods: [5, 10, 21, 63, 126, 252]  # Trading days
  min_momentum_score: 40          # Lowered from 60: small caps have choppier momentum signals

  # Earnings / catalyst
  earnings_lookahead_days: 14     # Days before earnings to flag
  min_earnings_surprise_pct: 5.0  # Minimum EPS beat to consider

  # Market regime
  vix_high_threshold: 25          # VIX above this = high vol regime
  vix_low_threshold: 15           # VIX below this = low vol regime
  market_breadth_threshold: 0.5   # Advance/decline ratio threshold

  # Market cap gate (10x potential filter)
  max_market_cap_millions: 2000   # $2B cap -- large caps excluded by design

  # Financial quality filters
  min_revenue_growth_pct: 10.0    # YoY revenue growth
  max_debt_to_equity: 3.0         # Leverage cap

# -----------------------------------------------------------
# Purple Team: 10x Potential Assessor
# -----------------------------------------------------------
purple_team:
  max_market_cap_millions: 2000   # Hard ceiling — stocks above this are disqualified
  ideal_market_cap_millions: 500  # Sweet spot for 10x potential
  max_float_millions: 50          # Prefer tight float
  min_insider_pct: 0.05           # Minimum insider ownership (decimal, 5%)

# -----------------------------------------------------------
# AI Re-Scoring (opt-in via --ai-rescore CLI flag)
# -----------------------------------------------------------
ai_rescore:
  enabled: false                  # Master switch (CLI --ai-rescore overrides)
  model: "claude-opus-4-6"
  max_tokens: 4096
  temperature: 0.3
  ai_weight: 0.3                  # Blend: quant*(1-w) + ai*w
  batch_size: 20                  # Max tickers per API call
  cache_ttl_hours: 2              # AI results cache (shorter than market data)
  timeout_seconds: 60
  max_retries: 3

# -----------------------------------------------------------
# Orchestrator: Composite Scoring Weights
# -----------------------------------------------------------
orchestrator:
  # Global market cap gate: applied post-merge to final results.
  # Tickers exceeding this cap are removed even if individual teams
  # have higher thresholds (e.g., Orange allows $5B).
  global_max_market_cap_millions: 5000

  # Resonance bonus: when N+ teams flag the same ticker with score > 0,
  # a multiplicative bonus is applied to reward multi-signal convergence.
  resonance_min_teams: 3          # Minimum teams for resonance bonus
  resonance_multiplier: 1.25      # 25% boost when resonance triggers

  team_weights:
    red: 1.2            # Short squeeze — core 10x driver (↑ from 1.0)
    orange: 1.0         # Gamma squeeze — important catalyst amplifier
    yellow: 0.7         # Sentiment — noisier, context signal (↓ from 0.8)
    green: 1.2          # Low float breakout — core 10x driver (↑ from 1.0)
    blue: 0.5           # Momentum — redesigned for small caps (↓ from 0.9)
    purple: 1.3         # 10x structural potential — highest weight (NEW)
